<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f1117;color:#f0f2ff;font-family:'Inter',system-ui,sans-serif;min-height:100vh;padding-bottom:72px}
input,select,button{font-family:inherit;font-size:15px}
input,select{width:100%;background:#080a10;border:1.5px solid #2e3350;border-radius:10px;padding:11px 13px;color:#f0f2ff;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:#4f8ef7}
select option{background:#0f1117}
button{cursor:pointer;border:none;border-radius:10px;font-weight:600;transition:opacity .15s}
button:active{opacity:.75}
.btn-primary{background:#4f8ef7;color:#fff;padding:13px;width:100%;font-size:15px}
.btn-green{background:#34d399;color:#0a1a12;padding:13px;width:100%;font-size:15px}
.btn-ghost{background:#2e3350;color:#f0f2ff;padding:10px 16px;font-size:13px}
label{display:block;font-size:12px;color:#8890b0;margin-bottom:5px;font-weight:500;letter-spacing:.3px}
.field{margin-bottom:15px}
.card{background:#1e2235;border:1px solid #2e3350;border-radius:14px;padding:16px}
.row{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.row .r-label{font-size:13px;color:#8890b0}
.row .r-value{font-size:13px;color:#f0f2ff;font-weight:500}
.row.bold .r-value{font-weight:800;font-size:15px}
.progress-bar{background:#2e3350;border-radius:4px;height:5px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;border-radius:4px;transition:width .4s}
.badge{border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;display:inline-block}
.badge-aberto{background:#4f8ef722;color:#4f8ef7;border:1px solid #4f8ef744}
.badge-atrasado{background:#f8717122;color:#f87171;border:1px solid #f8717144}
.badge-pago{background:#34d39922;color:#34d399;border:1px solid #34d39944}
.avatar{border-radius:50%;object-fit:cover;border:2px solid #2e3350;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
/* header */
#header{background:#13162000;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #2e3350;padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;background:#131620ee}
#header .logo-icon{font-size:22px}
#header .logo-name{font-weight:800;font-size:17px;letter-spacing:-.5px}
#header .logo-sub{font-size:11px;color:#8890b0}
/* nav */
#nav{position:fixed;bottom:0;left:0;right:0;background:#131620ee;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid #2e3350;display:flex;justify-content:space-around;padding:6px 0 10px;z-index:10}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 16px;color:#8890b0;font-size:11px;font-weight:500}
.nav-btn.active{color:#4f8ef7}
.nav-btn .nav-icon{font-size:22px}
/* content */
#content{padding:18px 16px;max-width:520px;margin:0 auto}
/* section title */
.sec-title{font-size:11px;font-weight:700;color:#8890b0;letter-spacing:1px;margin-bottom:10px}
/* stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.stat-card{background:#1e2235;border:1px solid #2e3350;border-radius:14px;padding:14px}
.stat-icon{font-size:20px;margin-bottom:6px}
.stat-value{font-size:17px;font-weight:800;margin-bottom:2px}
.stat-label{font-size:11px;color:#8890b0}
/* list items */
.list-item{background:#1e2235;border:1px solid #2e3350;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s}
.list-item:active{border-color:#4f8ef7}
.list-item.overdue{border-color:#f8717155}
.item-info{flex:1;min-width:0}
.item-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:12px;color:#8890b0;margin-top:1px}
.item-right{text-align:right;flex-shrink:0}
.item-value{font-weight:700;font-size:14px;color:#34d399}
.item-meta{font-size:11px;color:#8890b0}
/* modal */
#modal-overlay{display:none;position:fixed;inset:0;background:#00000099;z-index:50;align-items:flex-end;justify-content:center}
#modal-overlay.open{display:flex}
#modal-box{background:#131620;border:1px solid #2e3350;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding:22px 20px 32px}
.modal-handle{width:36px;height:4px;background:#2e3350;border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:18px}
/* photo preview */
.photo-wrap{display:flex;justify-content:center;margin-bottom:18px;position:relative}
.photo-edit-btn{position:absolute;bottom:0;right:calc(50% - 36px);background:#4f8ef7;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;border:none;cursor:pointer}
/* payment history */
.pay-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #2e3350;font-size:13px}
.pay-date{color:#8890b0}
.pay-amt{color:#34d399;font-weight:600}
/* type toggle */
.type-toggle{display:flex;gap:8px;margin-bottom:15px}
.type-btn{flex:1;padding:10px;font-size:13px;background:#2e3350;color:#8890b0;border:1.5px solid transparent}
.type-btn.active{background:#4f8ef722;color:#4f8ef7;border-color:#4f8ef755}
/* preview box */
.preview-box{background:#0f1220;border:1px solid #2e3350;border-radius:10px;padding:14px;margin-bottom:14px}
/* empty state */
.empty{text-align:center;color:#8890b0;padding:48px 20px;font-size:14px}
/* group label */
.group-label{font-size:11px;font-weight:700;color:#8890b0;letter-spacing:1px;margin:16px 0 8px}
/* fab */
.fab{position:fixed;bottom:80px;right:18px;background:#4f8ef7;color:#fff;border:none;border-radius:50%;width:52px;height:52px;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px #4f8ef755;cursor:pointer;z-index:9}
/* toast */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#34d399;color:#0a1a12;padding:10px 22px;border-radius:20px;font-weight:700;font-size:14px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:100;white-space:nowrap}
#toast.show{opacity:1}
/* section header row */
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-header h2{font-size:18px;font-weight:800}
</style>
</head>
<body>

<div id="header">
  <span class="logo-icon">💼</span>
  <div>
    <div class="logo-name">FinanceiroFácil</div>
    <div class="logo-sub">Controle de empréstimos</div>
  </div>
</div>

<div id="content"></div>

<nav id="nav">
  <button class="nav-btn active" onclick="setView('dashboard')" id="tab-dashboard">
    <span class="nav-icon">📊</span>Dashboard
  </button>
  <button class="nav-btn" onclick="setView('loans')" id="tab-loans">
    <span class="nav-icon">💸</span>Empréstimos
  </button>
  <button class="nav-btn" onclick="setView('clients')" id="tab-clients">
    <span class="nav-icon">👥</span>Clientes
  </button>
  <button class="nav-btn" onclick="setView('calc')" id="tab-calc">
    <span class="nav-icon">🧮</span>Simulador
  </button>
</nav>

<div id="modal-overlay" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────
let state = JSON.parse(localStorage.getItem('ff_state') || 'null') || {
  clients: [],
  loans: [],
  nextId: 1
};
let currentView = 'dashboard';
let modalData = {};

function save() { localStorage.setItem('ff_state', JSON.stringify(state)); }

// ─── HELPERS ─────────────────────────────────────
function fmtBRL(v) { return Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function fmtDate(s) { if(!s) return '—'; const[y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }
function today() { return new Date().toISOString().split('T')[0]; }
function addDays(s,n) { const d=new Date(s); d.setDate(d.getDate()+Number(n)); return d.toISOString().split('T')[0]; }
function getClient(id) { return state.clients.find(c=>c.id===Number(id)); }
function totalOwed(l) { return l.principal + l.principal * l.interest / 100; }
function totalPaid(l) { return (l.payments||[]).reduce((s,p)=>s+Number(p.amount),0); }
function remaining(l) { return Math.max(0, totalOwed(l) - totalPaid(l)); }
function isOverdue(l) { return l.status!=='pago' && l.dueDate < today(); }
function loanStatus(l) { return isOverdue(l) ? 'atrasado' : l.status; }

function avatarEl(client, size=40) {
  if(client?.photo) {
    return `<img src="${client.photo}" class="avatar" style="width:${size}px;height:${size}px"/>`;
  }
  const letter = client?.name?.[0]?.toUpperCase() || '?';
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:#4f8ef733;color:#4f8ef7;font-size:${Math.round(size*.38)}px">${letter}</div>`;
}
function badge(status) {
  const map={pago:'Pago',aberto:'Em aberto',atrasado:'Atrasado'};
  return `<span class="badge badge-${status}">${map[status]||status}</span>`;
}
function rowEl(label,value,extra='') {
  return `<div class="row ${extra}"><span class="r-label">${label}</span><span class="r-value">${value}</span></div>`;
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── NAVIGATION ──────────────────────────────────
function setView(v) {
  currentView = v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+v)?.classList.add('active');
  render();
}

function render() {
  const c = document.getElementById('content');
  if(currentView==='dashboard') c.innerHTML = renderDashboard();
  else if(currentView==='loans') c.innerHTML = renderLoans();
  else if(currentView==='clients') c.innerHTML = renderClients();
  else if(currentView==='calc') c.innerHTML = renderCalc();
}

// ─── DASHBOARD ───────────────────────────────────
function renderDashboard() {
  const active = state.loans.filter(l=>l.status!=='pago');
  const totalOut = active.reduce((s,l)=>s+l.principal,0);
  const totalRec = active.reduce((s,l)=>s+remaining(l),0);
  const overdue = state.loans.filter(isOverdue).length;
  const profit = state.loans.filter(l=>l.status==='pago').reduce((s,l)=>s+(totalOwed(l)-l.principal),0);

  const upcoming = [...state.loans]
    .filter(l=>l.status!=='pago')
    .sort((a,b)=>a.dueDate.localeCompare(b.dueDate))
    .slice(0,6);

  return `
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon">📤</div><div class="stat-value" style="color:#4f8ef7">${fmtBRL(totalOut)}</div><div class="stat-label">Total emprestado</div></div>
    <div class="stat-card"><div class="stat-icon">📥</div><div class="stat-value" style="color:#34d399">${fmtBRL(totalRec)}</div><div class="stat-label">A receber</div></div>
    <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-value" style="color:#f87171">${overdue} cliente(s)</div><div class="stat-label">Em atraso</div></div>
    <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value" style="color:#fbbf24">${fmtBRL(profit)}</div><div class="stat-label">Lucro em juros</div></div>
  </div>
  <div class="sec-title">PRÓXIMOS VENCIMENTOS</div>
  ${upcoming.length===0?'<div class="empty">Nenhum empréstimo ativo</div>':upcoming.map(l=>{
    const cl=getClient(l.clientId);
    const st=loanStatus(l);
    return `<div class="list-item ${st==='atrasado'?'overdue':''}" onclick="openLoanDetail(${l.id})">
      ${avatarEl(cl)}
      <div class="item-info"><div class="item-name">${cl?.name||'?'}</div><div class="item-sub">Vence ${fmtDate(l.dueDate)}</div></div>
      <div class="item-right"><div class="item-value">${fmtBRL(remaining(l))}</div>${badge(st)}</div>
    </div>`;
  }).join('')}`;
}

// ─── LOANS ───────────────────────────────────────
function renderLoans() {
  const groups=[
    {key:'atrasado',label:'⚠️ ATRASADOS',loans:state.loans.filter(l=>isOverdue(l))},
    {key:'aberto',label:'🟢 EM ABERTO',loans:state.loans.filter(l=>!isOverdue(l)&&l.status==='aberto')},
    {key:'pago',label:'✅ PAGOS',loans:state.loans.filter(l=>l.status==='pago')}
  ].filter(g=>g.loans.length>0);

  return `
  <div class="sec-header"><h2>Empréstimos</h2><button class="btn-ghost" onclick="openNewLoan()">+ Novo</button></div>
  ${groups.length===0?'<div class="empty">Nenhum empréstimo registrado</div>':groups.map(g=>`
    <div class="group-label">${g.label}</div>
    ${g.loans.map(l=>{
      const cl=getClient(l.clientId);
      const pct=Math.min(100,(totalPaid(l)/totalOwed(l))*100);
      const st=loanStatus(l);
      return `<div class="list-item ${st==='atrasado'?'overdue':''}" onclick="openLoanDetail(${l.id})" style="flex-direction:column;align-items:stretch;gap:10px">
        <div style="display:flex;align-items:center;gap:10px">
          ${avatarEl(cl,36)}
          <div class="item-info"><div class="item-name">${cl?.name||'?'}</div><div class="item-sub">Vence ${fmtDate(l.dueDate)} · ${l.interest}% juros</div></div>
          <div class="item-right"><div class="item-value">${fmtBRL(remaining(l))}</div><div class="item-meta">de ${fmtBRL(totalOwed(l))}</div></div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${st==='pago'?'#34d399':'#4f8ef7'}"></div></div>
      </div>`;
    }).join('')}`).join('')}`;
}

// ─── CLIENTS ─────────────────────────────────────
function renderClients() {
  return `
  <div class="sec-header"><h2>Clientes</h2><button class="btn-ghost" onclick="openNewClient()">+ Novo</button></div>
  ${state.clients.length===0?'<div class="empty">Nenhum cliente cadastrado</div>':state.clients.map(c=>{
    const active=state.loans.filter(l=>l.clientId===c.id&&l.status!=='pago').length;
    return `<div class="list-item" onclick="openClientDetail(${c.id})">
      ${avatarEl(c,46)}
      <div class="item-info"><div class="item-name">${c.name}</div><div class="item-sub">${c.phone}</div></div>
      <div class="item-right"><div class="item-meta">${active} ativo(s)</div><div style="font-size:20px;color:#8890b0">›</div></div>
    </div>`;
  }).join('')}`;
}

// ─── CALC ────────────────────────────────────────
function renderCalc() {
  return `
  <h2 style="font-size:18px;font-weight:800;margin-bottom:16px">Simulador de empréstimo</h2>
  <div class="card" style="gap:0">
    <div class="field"><label>Valor (R$)</label><input type="number" id="c-principal" placeholder="1000" oninput="calcUpdate()"/></div>
    <div class="field"><label>Juros simples (%)</label><input type="number" id="c-interest" placeholder="10" oninput="calcUpdate()"/></div>
    <div class="field"><label>Prazo (dias)</label><input type="number" id="c-days" placeholder="30" oninput="calcUpdate()"/></div>
    <div class="field">
      <label>Tipo de pagamento</label>
      <div class="type-toggle">
        <button class="type-btn active" id="ct-unico" onclick="calcType('unico')">Pagamento único</button>
        <button class="type-btn" id="ct-parcelas" onclick="calcType('parcelas')">Parcelado</button>
      </div>
    </div>
    <div id="c-installments-wrap" style="display:none" class="field"><label>Número de parcelas</label><input type="number" id="c-installments" value="2" min="2" oninput="calcUpdate()"/></div>
    <div id="c-result" class="preview-box" style="display:none"></div>
  </div>`;
}
window._calcType = 'unico';
function calcType(t) {
  window._calcType=t;
  document.getElementById('ct-unico').className='type-btn'+(t==='unico'?' active':'');
  document.getElementById('ct-parcelas').className='type-btn'+(t==='parcelas'?' active':'');
  document.getElementById('c-installments-wrap').style.display=t==='parcelas'?'block':'none';
  calcUpdate();
}
function calcUpdate() {
  const p=Number(document.getElementById('c-principal')?.value);
  const r=Number(document.getElementById('c-interest')?.value);
  const days=Number(document.getElementById('c-days')?.value);
  const n=Number(document.getElementById('c-installments')?.value)||1;
  const res=document.getElementById('c-result');
  if(!p||!r){if(res)res.style.display='none';return;}
  const juros=p*r/100, total=p+juros, parcela=window._calcType==='parcelas'?total/n:0;
  res.style.display='block';
  res.innerHTML=`
    ${rowEl('Valor emprestado',fmtBRL(p))}
    ${rowEl('Juros','<span style="color:#fbbf24">'+fmtBRL(juros)+'</span>')}
    ${rowEl('Total a receber','<span style="color:#34d399;font-weight:800">'+fmtBRL(total)+'</span>','bold')}
    ${window._calcType==='parcelas'?rowEl(`Parcela (${n}x)`,fmtBRL(parcela)):''}
    ${days?rowEl('Vencimento estimado',fmtDate(addDays(today(),days))):''}
  `;
}

// ─── MODAL HELPERS ───────────────────────────────
function openModal(html) {
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}

// ─── CLIENT FORMS ────────────────────────────────
let _editPhoto = null;
function openNewClient() {
  _editPhoto=null;
  openModal(`
    <div class="modal-title">Novo cliente</div>
    <div class="photo-wrap">
      <div id="avatar-preview">${avatarEl({name:'',photo:null},72)}</div>
      <button class="photo-edit-btn" onclick="document.getElementById('photo-input').click()">✏️</button>
      <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhoto(event)"/>
    </div>
    <div class="field"><label>Nome completo *</label><input id="cl-name" placeholder="João Silva"/></div>
    <div class="field"><label>Telefone *</label><input id="cl-phone" placeholder="11 99999-0000" type="tel"/></div>
    <div class="field"><label>Endereço</label><input id="cl-address" placeholder="Rua, número, bairro"/></div>
    <button class="btn-primary" onclick="saveClient()">Cadastrar cliente</button>
  `);
}
function openEditClient(id) {
  const c=getClient(id); _editPhoto=c.photo||null;
  openModal(`
    <div class="modal-title">Editar cliente</div>
    <div class="photo-wrap">
      <div id="avatar-preview">${avatarEl(c,72)}</div>
      <button class="photo-edit-btn" onclick="document.getElementById('photo-input').click()">✏️</button>
      <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhoto(event)"/>
    </div>
    <div class="field"><label>Nome completo *</label><input id="cl-name" value="${c.name}"/></div>
    <div class="field"><label>Telefone *</label><input id="cl-phone" value="${c.phone}" type="tel"/></div>
    <div class="field"><label>Endereço</label><input id="cl-address" value="${c.address||''}"/></div>
    <button class="btn-primary" onclick="saveClient(${id})">Salvar alterações</button>
  `);
}
function handlePhoto(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    _editPhoto=ev.target.result;
    document.getElementById('avatar-preview').innerHTML=`<img src="${_editPhoto}" class="avatar" style="width:72px;height:72px"/>`;
  };
  reader.readAsDataURL(file);
}
function saveClient(id) {
  const name=document.getElementById('cl-name').value.trim();
  const phone=document.getElementById('cl-phone').value.trim();
  if(!name||!phone){toast('Preencha nome e telefone');return;}
  const address=document.getElementById('cl-address').value.trim();
  if(id) {
    state.clients=state.clients.map(c=>c.id===Number(id)?{...c,name,phone,address,photo:_editPhoto}:c);
  } else {
    state.clients.push({id:state.nextId++,name,phone,address,photo:_editPhoto||null});
  }
  save(); closeModal(); render(); toast('Cliente salvo ✓');
}

// ─── CLIENT DETAIL ───────────────────────────────
function openClientDetail(id) {
  const c=getClient(id);
  const clientLoans=state.loans.filter(l=>l.clientId===Number(id));
  openModal(`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
      ${avatarEl(c,56)}
      <div><div style="font-weight:800;font-size:18px">${c.name}</div>
      <div style="color:#8890b0;font-size:13px">${c.phone}</div>
      ${c.address?`<div style="color:#8890b0;font-size:12px">${c.address}</div>`:''}
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <button class="btn-ghost" style="flex:1" onclick="closeModal();setTimeout(()=>openEditClient(${c.id}),100)">✏️ Editar</button>
      <button class="btn-primary" style="flex:1;padding:10px" onclick="closeModal();setTimeout(()=>openNewLoan(${c.id}),100)">+ Empréstimo</button>
    </div>
    <button onclick="deleteClient(${c.id})" style="width:100%;background:#f8717118;color:#f87171;border:1px solid #f8717144;border-radius:10px;padding:11px;font-size:13px;font-weight:600;margin-bottom:18px">🗑 Excluir cliente</button>
    <div class="sec-title">HISTÓRICO DE EMPRÉSTIMOS</div>
    ${clientLoans.length===0?'<div class="empty" style="padding:20px">Nenhum empréstimo</div>':clientLoans.map(l=>`
      <div class="list-item" onclick="closeModal();setTimeout(()=>openLoanDetail(${l.id}),100)" style="margin-bottom:8px">
        <div class="item-info"><div class="item-name">${fmtBRL(l.principal)}</div><div class="item-sub">Vence ${fmtDate(l.dueDate)}</div></div>
        ${badge(loanStatus(l))}
      </div>`).join('')}
  `);
}

// ─── LOAN FORM ───────────────────────────────────
function openNewLoan(preClientId) {
  openModal(`
    <div class="modal-title">Novo empréstimo</div>
    <div class="field"><label>Cliente *</label>
      <select id="l-client">
        <option value="">Selecione...</option>
        ${state.clients.map(c=>`<option value="${c.id}" ${Number(preClientId)===c.id?'selected':''}>${c.name}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>Valor (R$) *</label><input type="number" id="l-principal" placeholder="500" oninput="loanPreview()"/></div>
    <div class="field"><label>Juros simples (%) *</label><input type="number" id="l-interest" placeholder="10" oninput="loanPreview()"/></div>
    <div class="field"><label>Data de início *</label><input type="date" id="l-start" value="${today()}" oninput="loanPreview()"/></div>
    <div class="field"><label>Prazo (dias) *</label><input type="number" id="l-days" placeholder="30" oninput="loanPreview()"/></div>
    <div class="field">
      <label>Tipo de pagamento *</label>
      <div class="type-toggle">
        <button class="type-btn active" id="lt-unico" onclick="loanType('unico')">Pagamento único</button>
        <button class="type-btn" id="lt-parcelas" onclick="loanType('parcelas')">Parcelado</button>
      </div>
    </div>
    <div id="l-inst-wrap" style="display:none" class="field"><label>Número de parcelas</label><input type="number" id="l-installments" value="2" min="2" oninput="loanPreview()"/></div>
    <div id="l-preview" class="preview-box" style="display:none"></div>
    <button class="btn-primary" onclick="saveLoan()">Registrar empréstimo</button>
  `);
}
window._loanType='unico';
function loanType(t) {
  window._loanType=t;
  document.getElementById('lt-unico').className='type-btn'+(t==='unico'?' active':'');
  document.getElementById('lt-parcelas').className='type-btn'+(t==='parcelas'?' active':'');
  document.getElementById('l-inst-wrap').style.display=t==='parcelas'?'block':'none';
  loanPreview();
}
function loanPreview() {
  const p=Number(document.getElementById('l-principal')?.value);
  const r=Number(document.getElementById('l-interest')?.value);
  const days=Number(document.getElementById('l-days')?.value);
  const start=document.getElementById('l-start')?.value;
  const n=Number(document.getElementById('l-installments')?.value)||1;
  const prev=document.getElementById('l-preview');
  if(!p||!r){if(prev)prev.style.display='none';return;}
  const juros=p*r/100, total=p+juros;
  prev.style.display='block';
  prev.innerHTML=`
    ${rowEl('Juros','<span style="color:#fbbf24">'+fmtBRL(juros)+'</span>')}
    ${rowEl('Total a receber','<span style="color:#34d399;font-weight:800">'+fmtBRL(total)+'</span>','bold')}
    ${window._loanType==='parcelas'?rowEl(`Parcela (${n}x)`,fmtBRL(total/n)):''}
    ${days&&start?rowEl('Vencimento',fmtDate(addDays(start,days))):''}
  `;
}
function saveLoan() {
  const clientId=Number(document.getElementById('l-client').value);
  const principal=Number(document.getElementById('l-principal').value);
  const interest=Number(document.getElementById('l-interest').value);
  const startDate=document.getElementById('l-start').value;
  const days=Number(document.getElementById('l-days').value);
  const installments=Number(document.getElementById('l-installments')?.value)||1;
  if(!clientId||!principal||!interest||!startDate||!days){toast('Preencha todos os campos obrigatórios');return;}
  const dueDate=addDays(startDate,days);
  state.loans.push({id:state.nextId++,clientId,principal,interest,startDate,dueDate,type:window._loanType,installments,status:'aberto',payments:[]});
  save(); closeModal(); render(); toast('Empréstimo registrado ✓');
}

// ─── LOAN DETAIL ─────────────────────────────────
function openLoanDetail(id) {
  const l=state.loans.find(x=>x.id===Number(id));
  const cl=getClient(l.clientId);
  const owed=totalOwed(l), paid=totalPaid(l), rem=remaining(l);
  const pct=Math.min(100,(paid/owed)*100);
  const st=loanStatus(l);
  openModal(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
      ${avatarEl(cl,44)}
      <div style="flex:1"><div style="font-weight:800;font-size:16px">${cl?.name||'?'}</div>
      <div style="color:#8890b0;font-size:12px">Empréstimo de ${fmtBRL(l.principal)}</div></div>
      ${badge(st)}
    </div>
    <div class="card" style="margin-bottom:14px">
      ${rowEl('Valor emprestado',fmtBRL(l.principal))}
      ${rowEl('Juros ('+l.interest+'%)','<span style="color:#fbbf24">'+fmtBRL(owed-l.principal)+'</span>')}
      ${rowEl('Total a receber',fmtBRL(owed),'bold')}
      ${rowEl('Total pago','<span style="color:#34d399">'+fmtBRL(paid)+'</span>')}
      ${rowEl('Restante','<span style="color:'+(rem>0?'#f87171':'#34d399')+'">'+fmtBRL(rem)+'</span>','bold')}
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${st==='pago'?'#34d399':'#4f8ef7'}"></div></div>
      <div style="font-size:11px;color:#8890b0;text-align:right;margin-top:4px">${pct.toFixed(0)}% pago</div>
    </div>
    <div class="card" style="margin-bottom:14px">
      ${rowEl('Início',fmtDate(l.startDate))}
      ${rowEl('Vencimento',fmtDate(l.dueDate))}
      ${rowEl('Pagamento',l.type==='unico'?'Único':l.installments+'x parcelas')}
    </div>
    ${l.payments?.length>0?`
      <div class="sec-title" style="margin-top:4px">PAGAMENTOS RECEBIDOS</div>
      ${l.payments.map(p=>`<div class="pay-row"><span class="pay-date">${fmtDate(p.date)}</span><span class="pay-amt">${fmtBRL(p.amount)}</span></div>`).join('')}
      <div style="margin-bottom:14px"></div>`:''}
    ${st!=='pago'?`<button class="btn-green" onclick="openPayment(${l.id})">💵 Registrar pagamento</button>`:'<div style="text-align:center;color:#34d399;font-weight:700;padding:12px">✅ Empréstimo quitado</div>'}
    <button onclick="deleteLoan(${l.id})" style="width:100%;background:#f8717118;color:#f87171;border:1px solid #f8717144;border-radius:10px;padding:11px;font-size:13px;font-weight:600;margin-top:10px">🗑 Excluir empréstimo</button>
  `);
}

// ─── PAYMENT ─────────────────────────────────────
function openPayment(id) {
  const l=state.loans.find(x=>x.id===Number(id));
  openModal(`
    <div class="modal-title">Registrar pagamento</div>
    <div style="color:#8890b0;font-size:13px;margin-bottom:14px">Restante: <strong style="color:#34d399">${fmtBRL(remaining(l))}</strong></div>
    <div class="field"><label>Valor recebido (R$) *</label><input type="number" id="pay-amount" value="${remaining(l).toFixed(2)}"/></div>
    <button class="btn-green" onclick="savePayment(${id})">Confirmar pagamento</button>
  `);
}
function savePayment(id) {
  const amount=Number(document.getElementById('pay-amount').value);
  if(!amount){toast('Informe o valor');return;}
  state.loans=state.loans.map(l=>{
    if(l.id!==Number(id)) return l;
    const payments=[...(l.payments||[]),{date:today(),amount}];
    const paid=payments.reduce((s,p)=>s+Number(p.amount),0);
    const status=paid>=totalOwed(l)?'pago':'aberto';
    return{...l,payments,status};
  });
  save(); closeModal(); render(); toast('Pagamento registrado ✓');
}

// ─── DELETE ──────────────────────────────────────
function deleteClient(id) {
  const hasLoans = state.loans.some(l=>l.clientId===Number(id));
  if(hasLoans) {
    if(!confirm('Este cliente tem empréstimos. Excluir o cliente e todos os empréstimos dele?')) return;
    state.loans = state.loans.filter(l=>l.clientId!==Number(id));
  } else {
    if(!confirm('Excluir este cliente?')) return;
  }
  state.clients = state.clients.filter(c=>c.id!==Number(id));
  save(); closeModal(); render(); toast('Cliente excluído');
}
function deleteLoan(id) {
  if(!confirm('Excluir este empréstimo?')) return;
  state.loans = state.loans.filter(l=>l.id!==Number(id));
  save(); closeModal(); render(); toast('Empréstimo excluído');
}

// ─── PWA SERVICE WORKER ──────────────────────────
if('serviceWorker' in navigator) {
  const sw=`
    const CACHE='ff-v1';
    const FILES=['/'];
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));
  `;
  const blob=new Blob([sw],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}

// ─── INIT ────────────────────────────────────────
render();
</script>
</body>
</html>
